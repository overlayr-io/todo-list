<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<aside style="width:214px;height:100%;flex:none;background:var(--panel);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:18px 12px;color:var(--tx)">
  <div style="display:flex;align-items:center;gap:10px;padding:6px 8px 22px">
    <div style="width:28px;height:28px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#04211d;font-weight:700;font-size:14px">O</div>
    <span style="font-weight:600;font-size:14.5px;letter-spacing:-.01em">Objectifs</span>
  </div>
  <nav style="display:flex;flex-direction:column;gap:3px">
    <div style="{{ sOverview }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="7" height="7" rx="1.6"/><rect x="14" y="3" width="7" height="7" rx="1.6"/><rect x="3" y="14" width="7" height="7" rx="1.6"/><rect x="14" y="14" width="7" height="7" rx="1.6"/></svg>Vue d'ensemble</div>
    <div style="{{ sUpcoming }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="4.5" width="18" height="16.5" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>À venir</div>
    <div style="{{ sProject }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3l8 4-8 4-8-4 8-4z"/><path d="M4 12l8 4 8-4M4 16.5l8 4 8-4"/></svg>Projet</div>
    <div style="{{ sLabel }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 4h7.2l8.3 8.3-7.2 7.2L4 11.2z"/><circle cx="8.3" cy="8.3" r="1.3" fill="currentColor" stroke="none"/></svg>Étiquette</div>
  </nav>
  <div style="margin-top:8px;padding:14px 10px 6px">
    <div style="font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);padding:0 2px 10px">Projets</div>
    <div style="display:flex;flex-direction:column;gap:3px">
      <div style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;color:var(--tx2);font-size:13px"><span style="width:8px;height:8px;border-radius:2px;background:#a78bfa"></span>Objectifs 2026</div>
      <div style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;color:var(--tx2);font-size:13px"><span style="width:8px;height:8px;border-radius:2px;background:#60a5fa"></span>Apprentissages</div>
    </div>
  </div>
  <div style="margin-top:auto;display:flex;flex-direction:column;gap:12px">
    <div style="display:flex;align-items:center;background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:3px">
      <div style="{{ tDark }}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>Sombre</div>
      <div style="{{ tLight }}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>Clair</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:8px 6px;border-top:1px solid var(--bd)">
      <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#334155,#1e293b);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#cbd5e1">LM</div>
      <div style="line-height:1.3"><div style="font-size:12.5px;font-weight:500;color:var(--tx)">Tharshigan</div><div style="font-size:11px;color:var(--mut)">Compte perso</div></div>
    </div>
  </div>
</aside>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;214px&quot;,&quot;height&quot;:&quot;620px&quot;},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;overview&quot;,&quot;upcoming&quot;,&quot;project&quot;,&quot;label&quot;],&quot;default&quot;:&quot;overview&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;default&quot;:&quot;dark&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const a = this.props.active || 'overview';
    const light = this.props.theme === 'light';
    const base = 'display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;font-weight:500;font-size:14px;';
    const on = base + 'background:var(--soft);color:var(--accent);';
    const off = base + 'color:var(--tx2);';
    const mk = k => a === k ? on : off;
    const tb = 'flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:6px;border-radius:7px;font-size:12px;';
    const tOn = tb + 'background:var(--card2);color:var(--tx);font-weight:500;';
    const tOff = tb + 'color:var(--mut);';
    return {
      sOverview: mk('overview'), sUpcoming: mk('upcoming'), sProject: mk('project'), sLabel: mk('label'),
      tDark: light ? tOff : tOn, tLight: light ? tOn : tOff
    };
  }
}
</script>
</body>
</html>
