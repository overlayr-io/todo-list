services:
  db:
    image: postgres:16-alpine
    container_name: objectifs_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-objectifs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-objectifs}
      POSTGRES_DB: ${POSTGRES_DB:-objectifs}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-objectifs} -d ${POSTGRES_DB:-objectifs}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: objectifs_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-objectifs}:${POSTGRES_PASSWORD:-objectifs}@db:5432/${POSTGRES_DB:-objectifs}
      RUN_MIGRATIONS: "true"
      RUN_SEED: ${RUN_SEED:-true}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:4000/api/sync/google/callback}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
    ports:
      - "${BACKEND_PORT:-4000}:4000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:4000/api}
    container_name: objectifs_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  db_data:
