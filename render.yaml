# Render blueprint — https://render.com/docs/blueprint-spec
# Deploy: push this repo to GitHub/GitLab, then in Render → "New +" → "Blueprint"
# and point it at the repo. Render provisions the database and both services.
#
# After the first deploy, set the two cross-referencing URLs (marked sync:false)
# in the Render dashboard — see README > "Déploiement sur Render".

databases:
  - name: objectifs-db
    databaseName: objectifs
    user: objectifs
    plan: free

services:
  # ---- Backend : Express API (Docker) ----
  - type: web
    name: objectifs-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: objectifs-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: RUN_MIGRATIONS
        value: "true"
      - key: RUN_SEED
        value: "true"
      # Frontend origin allowed by CORS + used to redirect back after OAuth.
      # Set to the static site URL once it exists (e.g. https://objectifs-frontend.onrender.com).
      - key: CORS_ORIGIN
        sync: false
      - key: APP_BASE_URL
        sync: false
      # Optional Google Calendar sync
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false

  # ---- Frontend : Vue SPA (Docker, nginx) ----
  - type: web
    name: objectifs-frontend
    runtime: docker
    plan: free
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Render forwards this service's env vars as Docker build ARGs (the
    # Dockerfile declares `ARG VITE_API_BASE`), so it's baked into the bundle
    # at build time. Set it to the backend URL + /api once it exists (e.g.
    # https://objectifs-backend.onrender.com/api).
    envVars:
      - key: VITE_API_BASE
        sync: false
