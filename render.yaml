# Render blueprint — https://render.com/docs/blueprint-spec
# Deploy: push this repo to GitHub/GitLab, then in Render → "New +" → "Blueprint"
# and point it at the repo. Render provisions the database and both services.
#
# After the first deploy, set the two cross-referencing URLs (marked sync:false)
# in the Render dashboard — see README > "Déploiement sur Render".

databases:
  - name: objectifs-db
    databaseName: objectifs
    user: objectifs
    plan: free

services:
  # ---- Backend : Express API (Node web service) ----
  - type: web
    name: objectifs-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: objectifs-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: RUN_MIGRATIONS
        value: "true"
      - key: RUN_SEED
        value: "true"
      # Frontend origin allowed by CORS + used to redirect back after OAuth.
      # Set to the static site URL once it exists (e.g. https://objectifs-frontend.onrender.com).
      - key: CORS_ORIGIN
        sync: false
      - key: APP_BASE_URL
        sync: false
      # Optional Google Calendar sync
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false

  # ---- Frontend : Vue SPA (static site) ----
  - type: web
    name: objectifs-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # API base is baked in at build time. Set to the backend URL + /api once it
    # exists (e.g. https://objectifs-backend.onrender.com/api).
    envVars:
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
